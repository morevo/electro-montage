    <!-- SPA fallback redirect handler for GitHub Pages -->
    <script type="text/javascript">

          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
